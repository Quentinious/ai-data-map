services:
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    ports:
      - "4000:4000"
    env_file:
      - apps/backend/.env
    environment:
      PORT: "4000"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    ports:
      - "5173:5173"
    environment:
      VITE_BACKEND_BASE_URL: "http://localhost:4000"
    depends_on:
      - backend
    restart: unless-stopped
